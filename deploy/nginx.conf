# /etc/nginx/conf.d/hollyness.conf   (AlmaLinux/RHEL)
# /etc/nginx/sites-available/hollyness  (Ubuntu/Debian — then symlink to sites-enabled)
#
# After DNS is live, get free SSL with:
#   certbot --nginx -d hollyrespishers.com -d www.hollyrespishers.com

server {
    listen 80;
    server_name hollyrespishers.com www.hollyrespishers.com;

    # Max upload size (blog covers, team photos, testimonial images)
    client_max_body_size 10M;

    # Proxy all requests to the FastAPI app (serves API + built SPA)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    # Serve uploaded files directly — faster than proxying through Python
    location /uploads/ {
        alias /var/www/hollyness/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;
}
