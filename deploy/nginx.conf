# /etc/nginx/sites-available/hollyness
#
# IP-only setup (no domain). When you get a domain later:
#   1. Replace "server_name _;" with "server_name yourdomain.com www.yourdomain.com;"
#   2. Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#      (certbot will add the HTTPS block automatically)

server {
    listen 80 default_server;
    server_name _;

    # Max upload size (blog covers, team photos, testimonial images)
    client_max_body_size 10M;

    # Proxy everything to the FastAPI app (which also serves the built SPA)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Allow large request bodies (file uploads through the API)
        proxy_request_buffering off;
    }

    # Serve uploaded files (photos, covers) directly — faster than proxying
    location /uploads/ {
        alias /var/www/hollyness/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide nginx version
    server_tokens off;
}
