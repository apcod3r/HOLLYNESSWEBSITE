# /etc/nginx/sites-available/hollyness
# Replace YOUR_DOMAIN with your actual domain (e.g. hollyrespishers.com)
# After Let's Encrypt runs, certbot will add the SSL block automatically.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Max upload size (for blog covers, team photos, etc.)
    client_max_body_size 10M;

    # All traffic goes to the FastAPI app (which serves both API and built SPA)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve uploaded files directly through nginx for speed
    location /uploads/ {
        alias /var/www/hollyness/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
