# /etc/nginx/sites-available/hollyness   (Ubuntu/Debian path)
# /etc/nginx/conf.d/hollyness.conf       (AlmaLinux/RHEL path — use this one)
#
# Replace YOUR_DOMAIN with your actual domain (e.g. hollyrespishers.com)
# After setting the domain, run:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN
#
# For IP-only (no domain yet): set  server_name _;  and remove the www line.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Max upload size (blog covers, team photos, testimonial images)
    client_max_body_size 10M;

    # Proxy all requests to the FastAPI app (serves API + built SPA)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }

    # Serve uploaded files directly — faster than proxying through Python
    location /uploads/ {
        alias /var/www/hollyness/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;
}
